services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: weather_station
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - weather-net

  app:
    build: ./AIThermalGuardIoT
    ports:
      - "8080:8080"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: weather_station
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    networks:
      - weather-net

networks:
  weather-net:
    driver: bridge

volumes:
  pgdata:
